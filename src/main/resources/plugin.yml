name: ProxyBanSystem
main: proxyBanSystem.bukkit.BukkitPlugin
version: 4.3
author: Julian1657
description: Cross-platform MySQL ban system for Bukkit, Spigot, Paper, Purpur, Folia, Leaf, and more.
website: https://github.com/juli22292/ProxyBanSystem
api-version: '1.20'
folia-supported: true
permissions:
  punishsystem.admin.use:
    description: Allows use of admin, ban, unban, lookup, and management commands.
    default: op
  punishsystem.admin.seebans:
    description: Receives ban and unban broadcasts.
    default: op
