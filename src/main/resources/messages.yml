  date-format: "dd.MM.yyyy HH:mm:ss"
  history-date-format: "dd-MM-yyyy HH:mm:ss"
  line: "&8&m----------------------------------------"
  list-separator: ", "
  console-name: "Console"
  unknown: "Unbekannt"
  none: "Keine Einträge"
  permanent: "Permanent"
  not-banned: "Nicht gebannt"
  zero-duration: "0 Minuten"
  reason-suggestion-fallback: "Grund"
  player-history-reason-format: "{executor} &8(&c{reason}&8)"
  ban-message-body-marker: "&7Du wurdest"
  discord-link: "deinserver"

