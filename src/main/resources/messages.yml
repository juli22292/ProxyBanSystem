formats:
  admin-help:
    - "{prefix}&bAdminPunish Hilfe"
    - ""
    - "&a/{adminpunish_command} {adminpunish_reload_subcommand} &8- &7Lädt config.yml und messages.yml neu"
    - "&a/{adminpunish_command} {adminpunish_help_subcommand} &8- &7Zeigt diese Hilfe an"
    - ""
    - "&7Whitelist: Spieler aus der messages.yml können nicht gebannt werden."
  ban-message:
    - "{prefix}"
    - ""
    - "&7Grund&8:&r {grund} &8» {zeit}"
    - ""
    - "&7Verbleibend&8:&r {verbleibend}"
    - "&7Gebannt bis&8:&r {bis}"
    - ""
    - "&9Discord&8:&r &adiscord.gg/{discord_link}"
  ban-screen:
    - "{message}"
  ban-broadcast: "&c&lBAN&r &8» &a{gebannter_spieler} &8v. &a{banausführer} &8(&c{bangrund}&8)"
  unban-broadcast: "{unban_broadcast_prefix}&c{player} &8v. &c{executor}"
  punishment-list:
    - "{line}"
    - "{prefix}&c&lALLE BANS"
    - "{line}"
    - ""
    - "{entries}"
    - ""
    - "{line}"
  punishment-list-entry: "&8» &7Name&8: &f{name} &8| &7UUID&8: &f{uuid}"
  lookup:
    - "{line}"
    - "{prefix}&c&lLOOKUP &8» &f{player}"
    - "{line}"
    - ""
    - "&8» &7UUID&8: &f{uuid}"
    - "&8» &7Status&8: {status}"
    - "&8» &7Letzter Ban&8: &f{banned_at}"
    - "&8» &7Gebannt bis&8: &f{banned_until}"
    - ""
    - "&8» &7Grund&8: &f{reason}"
    - "&8» &7Banns&8: &c{ban_count}"
    - "&8» &7Gebannt von&8: &f{banned_by}"
    - "&8» &7Alle Banner&8: &f{all_banned_by}"
    - ""
    - "&8» &7Entbanns&8: &a{unban_count}"
    - "&8» &7Entbannt von&8: &f{unbanned_by}"
    - ""
    - "{line}"
  lookupremove-list:
    - "{line}"
    - "{prefix}&c&lLOOKUPREMOVE &8» &f{player}"
    - "{line}"
    - ""
    - "{entries}"
    - ""
    - "&7Nutze &a/{lookupremove_command} {player} <Nummer>&7, um einen Grund zu entfernen&8."
    - ""
    - "{line}"
  lookupremove-entry: "&8» &c#{index} &f{reason}"

duration:
  day-singular: "Tag"
  day-plural: "Tage"
  hour-singular: "Stunde"
  hour-plural: "Stunden"
  minute-singular: "Minute"
  minute-plural: "Minuten"

default-ban-reason:
  display: "{input}"
  duration: "1d"

ban-reasons:
  hacking:
    display: "&cHacking"
    duration: "7d"
  cheating:
    display: "&cCheating"
    duration: "7d"
  griefing:
    display: "&6Griefing"
    duration: "1d"
  toxisch:
    display: "&eToxisches Verhalten"
    duration: "30m"
  chatspam:
    display: "&bChatspam"
    duration: "15m"
  auszeit:
    display: "&eAuszeit"
    duration: "15m"
  beleidigung:
    display: "&cBeleidigung"
    duration: "120m"
  fehlerausnutzung:
    display: "&5Fehlerausnutzung"
    duration: "7d"
  werbung:
    display: "&dWerbung"
    duration: "3d"
  teamhintergehung:
    display: "&cTeamhintergehung"
    duration: "7d"
  hausverbot:
    display: "&4HAUSVERBOT"
    duration: "permanent"
  multiaccounting:
    display: "&4MULTIACCOUNTING"
    duration: "permanent"

whitelist:
  - Julian1657
