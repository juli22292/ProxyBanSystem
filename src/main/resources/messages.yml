settings:
  # Choose the active language here. Available values: en, de
  language: "en"
  available-languages:
    - "en"
    - "de"
  timezone: "Europe/Berlin"
  date-format: "dd.MM.yyyy HH:mm:ss"
  history-date-format: "dd-MM-yyyy HH:mm:ss"
  line: "&8&m----------------------------------------"
  list-separator: ", "
  console-name: "Console"
  unknown: "Unknown"
  none: "No entries"
  permanent: "Permanent"
  not-banned: "Not banned"
  zero-duration: "0 minutes"
  reason-suggestion-fallback: "Reason"
  player-history-reason-format: "{executor} &8(&c{reason}&8)"
  ban-message-body-marker: "&7You have been"
  discord-link: "yourserver"

commands:
  punish: "punish"
  unpunish: "unpunish"
  lookup: "lookup"
  lookupremove: "lookupremove"
  lookupfullremove: "lookupfullremove"
  punishment: "punishment"
  adminpunish: "adminpunish"
  adminpunish-reload: "reload"
  adminpunish-help: "help"
  punishment-listallbans: "listallbans"
  punishment-reload: "reload"
  punishment-add: "add"
  punishment-remove: "remove"
  punishment-whitelist: "whitelist"

messages:
  no-permission: "{prefix}&cYou do not have permission&8."
  admin-reload-success: "{prefix}&aThe configuration has been reloaded&8."
  admin-reload-failed: "{prefix}&cThe configuration could not be reloaded&8."
  admin-unknown-subcommand: "{prefix}&cUnknown subcommand&8. &7Use &a/{adminpunish_command} {adminpunish_help_subcommand}&8."
  punish-usage: "{prefix}&a/{punish_command} &8<&aplayer/uuid&8> <&areason&8>"
  lookup-usage: "{prefix}&a/{lookup_command} &8<&aplayer/uuid&8>"
  lookupremove-usage: "{prefix}&a/{lookupremove_command} &8<&aplayer/uuid&8> <&anumber/reason&8>"
  lookupfullremove-usage: "{prefix}&a/{lookupfullremove_command} &8<&aplayer/uuid&8>"
  punishment-usage: "{prefix}&a/{punishment_command} &8<&alistallbans/reload/whitelist&8> <&aadd/remove&8> <&aplayer&8>"
  unpunish-usage: "{prefix}&a/{unpunish_command} &8<&aplayer/uuid&8>"
  player-not-found: "{prefix}&cPlayer not found&8."
  player-whitelisted: "{prefix}&cThis player is whitelisted and cannot be banned&8."
  mysql-not-connected: "{prefix}&cMySQL is not connected&8."
  player-already-banned: "{prefix}&cThis player is already banned&8."
  ban-save-failed: "{prefix}&cThe ban could not be saved&8."
  ban-success: "{prefix}&aPlayer banned successfully&8."
  player-not-banned: "{prefix}&cThis player is not banned&8."
  unban-save-failed: "{prefix}&cThe unban could not be saved&8."
  unban-success: "{prefix}&aPlayer unbanned successfully&8."
  no-ban-reasons: "{prefix}&cNo ban reasons are stored for this player&8."
  ban-reason-not-found: "{prefix}&cThis ban reason was not found&8."
  ban-reason-removed: "{prefix}&aBan reason removed&8: &f{reason}"
  ban-reason-remove-failed: "{prefix}&cThe ban reason could not be removed&8."
  lookupfullremove-success: "{prefix}&aThe full lookup history of &f{player} &ahas been deleted&8."
  lookupfullremove-failed: "{prefix}&cThe full lookup history could not be deleted&8."
  punishment-list-empty: "{prefix}&cThere are no active bans&8."
  punishment-whitelist-added: "{prefix}&aPlayer &f{player} &ahas been added to the whitelist&8."
  punishment-whitelist-already-added: "{prefix}&cPlayer &f{player} &cis already on the whitelist&8."
  punishment-whitelist-removed: "{prefix}&aPlayer &f{player} &ahas been removed from the whitelist&8."
  punishment-whitelist-not-found: "{prefix}&cPlayer &f{player} &cis not on the whitelist&8."
  punishment-whitelist-save-failed: "{prefix}&cThe whitelist could not be saved&8."
  login-ban-system-unavailable: "{prefix}&cThe ban system is currently unavailable."
  fallback-ban-message: "&cYou are banned&8."
  history-unban-reason: "Unbanned"
  lookup-status-active: "&cActively banned"
  lookup-status-inactive: "&aNot banned"

formats:
  admin-help:
    - "{prefix}&bAdminPunish Help"
    - ""
    - "&a/{adminpunish_command} {adminpunish_reload_subcommand} &8- &7Reloads config.yml and messages.yml"
    - "&a/{adminpunish_command} {adminpunish_help_subcommand} &8- &7Shows this help"
    - ""
    - "&7Whitelist: players in messages.yml cannot be banned."
  ban-message:
    - "{prefix}"
    - ""
    - "&7Reason&8:&r {reason} &8- {duration}"
    - ""
    - "&7Remaining&8:&r {remaining}"
    - "&7Banned until&8:&r {expires}"
    - ""
    - "&9Discord&8:&r &adiscord.gg/{discord_link}"
  ban-screen:
    - "{message}"
  ban-broadcast: "&c&lBAN&r &8> &a{player} &8by &a{executor} &8(&c{reason}&8)"
  unban-broadcast: "{unban_broadcast_prefix}&c{player} &8by &c{executor}"
  punishment-list:
    - "{line}"
    - "{prefix}&c&lALL BANS"
    - "{line}"
    - ""
    - "{entries}"
    - ""
    - "{line}"
  punishment-list-entry: "&8> &7Name&8: &f{name} &8| &7UUID&8: &f{uuid}"
  lookup:
    - "{line}"
    - "{prefix}&c&lLOOKUP &8> &f{player}"
    - "{line}"
    - ""
    - "&8> &7UUID&8: &f{uuid}"
    - "&8> &7Status&8: {status}"
    - "&8> &7Last ban&8: &f{banned_at}"
    - "&8> &7Banned until&8: &f{banned_until}"
    - ""
    - "&8> &7Reason&8: &f{reason}"
    - "&8> &7Bans&8: &c{ban_count}"
    - "&8> &7Banned by&8: &f{banned_by}"
    - "&8> &7All executors&8: &f{all_banned_by}"
    - ""
    - "&8> &7Unbans&8: &a{unban_count}"
    - "&8> &7Unbanned by&8: &f{unbanned_by}"
    - ""
    - "{line}"
  lookupremove-list:
    - "{line}"
    - "{prefix}&c&lLOOKUPREMOVE &8> &f{player}"
    - "{line}"
    - ""
    - "{entries}"
    - ""
    - "&7Use &a/{lookupremove_command} {player} <number>&7 to remove a reason&8."
    - ""
    - "{line}"
  lookupremove-entry: "&8> &c#{index} &f{reason}"

duration:
  day-singular: "day"
  day-plural: "days"
  hour-singular: "hour"
  hour-plural: "hours"
  minute-singular: "minute"
  minute-plural: "minutes"

default-ban-reason:
  display: "{input}"
  duration: "1d"

